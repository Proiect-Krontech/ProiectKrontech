<nav [class]="claseNavbar()">
  <div class="navbar__container container-pagina">

    
    <a href="/" class="navbar__logo" aria-label="Smart Pillow - Acasă">
      <svg class="navbar__logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Forma pernei -->
        <rect x="4" y="12" width="32" height="16" rx="8" fill="var(--culoare-primara)" opacity="0.15"/>
        <rect x="6" y="14" width="28" height="12" rx="6" stroke="var(--culoare-primara)" stroke-width="2" fill="none"/>
        <path d="M14 20 L17 16 L20 24 L23 18 L26 20" stroke="var(--culoare-primara)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="navbar__logo-text">Smart Pillow</span>
    </a>

   
    <div class="navbar__linkuri"
         [class.navbar__linkuri--deschis]="meniuDeschis()">

    
      @for (link of linkuriNavigare(); track link.ancora) {
        <a [href]="link.ancora"
           class="navbar__link"
           (click)="inchideMeniu()">
          {{ link.eticheta }}
        </a>
      }

      
      <a routerLink="/dashboard"
         class="navbar__buton-cta"
         (click)="inchideMeniu()">
        Conectează Perna
      </a>

     
      <a href="#cos"
         class="navbar__cos"
         (click)="inchideMeniu()"
         aria-label="Coș de cumpărături">
        
        <svg class="navbar__cos-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6V20C3 20.5304 3.21071 21.0391 3.58579 21.4142C3.96086 21.7893 4.46957 22 5 22H19C19.5304 22 20.0391 21.7893 20.4142 21.4142C20.7893 21.0391 21 20.5304 21 20V6L18 2H6Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 6H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 10C16 11.0609 15.5786 12.0783 14.8284 12.8284C14.0783 13.5786 13.0609 14 12 14C10.9391 14 9.92172 13.5786 9.17157 12.8284C8.42143 12.0783 8 11.0609 8 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      
        @if (!cosStore.esteGol()) {
          <span class="navbar__cos-badge">
            {{ cosStore.numarArticole() }}
          </span>
        }
      </a>
    </div>

    
    <button class="navbar__hamburger"
            (click)="comutaMeniu()"
            [attr.aria-expanded]="meniuDeschis()"
            aria-label="Deschide meniul de navigare">
      
      <span class="navbar__hamburger-linie"
            [class.navbar__hamburger-linie--deschis]="meniuDeschis()"></span>
      <span class="navbar__hamburger-linie"
            [class.navbar__hamburger-linie--deschis]="meniuDeschis()"></span>
      <span class="navbar__hamburger-linie"
            [class.navbar__hamburger-linie--deschis]="meniuDeschis()"></span>
    </button>

  </div>
</nav>
